  <rect x="38" y="44" width="44" height="30" rx="4" fill="#d9705a" stroke="#f5b84e" stroke-width="1.5"/>
  <rect x="38" y="40" width="44" height="8" rx="3" fill="#e8a33d" stroke="#f5b84e" stroke-width="1.2"/>
  <rect x="42" y="48" width="16" height="10" rx="2" fill="#7ea47a" opacity="0.8"/>
  <rect x="62" y="48" width="16" height="10" rx="2" fill="#7ea47a" opacity="0.8"/>
  <rect x="42" y="60" width="16" height="10" rx="2" fill="#7ea47a" opacity="0.6"/>
  <rect x="62" y="60" width="16" height="10" rx="2" fill="#7ea47a" opacity="0.6"/>
  <!-- Handle on top -->
  <path d="M52 40 Q52 30 60 28 Q68 30 68 40"
        stroke="#f5b84e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Flame / grain motif -->
  <path d="M60 76 L56 84 L60 82 L64 84 Z" fill="#f5b84e" opacity="0.4"/>
</svg>