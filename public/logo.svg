<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Shield / crest shape -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5b84e"/>
      <stop offset="100%" stop-color="#e8a33d"/>
    </linearGradient>
  </defs>
  <!-- Shield background -->
  <path d="M60 8 L108 30 L108 70 C108 95 85 112 60 120 C35 112 12 95 12 70 L12 30 Z"
        fill="#1a231e" stroke="url(#gold)" stroke-width="3"/>
